<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRISI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
h1 { font-size: 2.5em; margin-bottom: 8px; }
.sub { color: #8b949e; font-size: 0.9em; margin-bottom: 40px; }
.cards { display: flex; gap: 20px; }
a.card { display: block; background: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 30px 40px; text-align: center; text-decoration: none; color: #e6edf3; transition: all 0.2s; }
a.card:hover { border-color: #58a6ff; transform: translateY(-2px); }
.card .flag { font-size: 2.5em; margin-bottom: 8px; }
.card .name { font-size: 1.1em; font-weight: 600; }
.card .desc { font-size: 0.75em; color: #8b949e; margin-top: 4px; }
</style>
</head>
<body>
<h1>GRISI</h1>
<div class="sub">Global Retail Investor Sentiment Index</div>
<div class="cards">
  <a class="card" href="index.html">
    <div class="flag">🇺🇸</div>
    <div class="name">US Market</div>
    <div class="desc">SPY · VIX · Gold<br>English</div>
  </a>
  <a class="card" href="tw.html">
    <div class="flag">🇹🇼</div>
    <div class="name">台灣市場</div>
    <div class="desc">TAIEX · TSMC · 融資<br>繁體中文</div>
  </a>
</div>
</body>
</html>
